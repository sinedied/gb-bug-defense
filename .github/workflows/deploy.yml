name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel in-progress runs
# so a deployment finishes cleanly even if a new commit lands mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build ROM and web export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up just
        uses: extractions/setup-just@v4

      - name: Cache GBDK toolchain
        uses: actions/cache@v5
        with:
          path: vendor/gbdk
          key: gbdk-${{ runner.os }}-4.2.0

      - name: Build ROM
        run: just build

      - name: Run host tests
        run: just test

      - name: Validate ROM
        run: just check

      - name: Export web build
        run: just export-web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
